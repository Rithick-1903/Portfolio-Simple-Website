<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContactForm</title>
    <link rel="stylesheet" href="Style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Young+Serif&display=swap" rel="stylesheet">

</head>

<body>
    <div class="container">
        <div class="Section_one">
            <h2 class="Section-one__name">Rithik Reno</h2>
            <h4 class="Section-one__role">Web Developer</h4>
            <a class="Section-one__Contactform" href="index.html" target="_blank">Home</a>
        </div>
        <div class="contact-form">
            <form>
                <table>

                    <tr>
                        <td><label>Name :</label></td>
                        <td><input type="text" placeholder="Your name" class="contact-form__input"> </td>
                    </tr>
                    <tr>
                        <td><label>Email :</label></td>
                        <td><input type="text" placeholder="Your Email"class="contact-form__input2"> </td>
                    </tr>
                    <tr>
                        <td><label>Message :</label></td>
                        <td>
                            <textarea placeholder="Enter Message" class="contact-form__input3"></textarea>
                        </td>
                    </tr>
                    <tr>
                        <td></td>
                        <td><input type="submit" class="contact-form__input4"> </td>
                    </tr>
                </table>
            </form>
        </div>


        <div class="Section-five">
            <p class="Section-five__sm">Social Media :
                <a href="https://www.instagram.com/p/DVSVMqsE3vS/" target="_blank">instagram</a>
                <a href="https://www.linkedin.com/in/rithick-reno-1903vr9677646858/" target="_blank">linkedin</a>

            </p>
            <p class="Section-five__name">&copy;Rithick reno</p>
        </div>
</body>

</html>
